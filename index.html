<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONTO Lab | 知识祛魅共勉实验室</title>
    <!-- 使用 Tailwind CSS 进行响应式布局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 使用 Lucide Icons 增强视觉语义 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-lab: #F4F4F2;
            --font-serif: 'Noto Serif SC', serif;
            --font-sans: 'Inter', sans-serif;
        }
        body {
            background-color: var(--bg-lab);
            font-family: var(--font-serif);
            overflow: hidden;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .writing-v { writing-mode: vertical-rl; }
        input, textarea { font-family: var(--font-sans); }
        ::selection { background-color: #000; color: #fff; }
        /* 实验室卡片呼吸效果 */
        .lab-card {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .lab-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 顶栏导航 -->
    <header class="h-14 px-6 border-b border-black/[0.05] bg-white/60 backdrop-blur-md flex justify-between items-center z-50">
        <div class="flex items-center gap-4">
            <button id="back-home" class="p-1 hover:bg-black/5 rounded-full hidden">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center gap-2">
                <span class="text-[10px] tracking-[0.5em] font-bold uppercase opacity-30 select-none">Onto / Lab</span>
                <div class="h-3 w-px bg-black/10 mx-1"></div>
                <span id="display-username" class="text-[10px] opacity-40 uppercase tracking-widest font-bold">Scholar</span>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleScratchpad()" class="p-2 text-zinc-400 hover:text-black"><i data-lucide="notebook" class="w-4 h-4"></i></button>
            <button onclick="openSettings()" class="p-2 text-zinc-400 hover:text-black"><i data-lucide="settings" class="w-4 h-4"></i></button>
        </div>
    </header>

    <!-- 主容器 -->
    <main id="main-view" class="flex-1 relative overflow-hidden">
        <!-- 首页项目列表 -->
        <div id="home-view" class="h-full overflow-y-auto p-10 md:p-24 no-scrollbar">
            <div class="max-w-6xl mx-auto">
                <div class="flex justify-between items-end mb-16">
                    <div>
                        <h2 class="text-5xl font-light tracking-tighter mb-4 italic text-[#111]">Archives.</h2>
                        <p class="text-[10px] tracking-[0.4em] uppercase opacity-40 font-bold">选择一个知识共勉单元以开启产出</p>
                    </div>
                    <button onclick="createNewProject()" class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center hover:scale-105 transition-all shadow-xl shadow-black/10">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                    <!-- 项目磁贴动态加载 -->
                </div>
            </div>
        </div>

        <!-- 项目内部视图 -->
        <div id="project-view" class="h-full hidden flex flex-col md:flex-row overflow-hidden">
            <!-- 垂直侧导 -->
            <aside class="w-full md:w-16 flex-none border-r border-black/[0.05] bg-white flex md:flex-col items-center py-6 gap-8 z-20">
                <button onclick="switchTab('library')" id="tab-library" class="p-3 rounded-2xl transition-all bg-black text-white shadow-lg"><i data-lucide="library" class="w-5 h-5"></i></button>
                <button onclick="switchTab('workshop')" id="tab-workshop" class="p-3 rounded-2xl transition-all text-zinc-300 hover:text-black"><i data-lucide="graduation-cap" class="w-5 h-5"></i></button>
                <div class="flex-1"></div>
                <button onclick="toggleAnalysis()" id="btn-analysis" class="p-3 rounded-2xl transition-all text-zinc-300 hover:text-red-900"><i data-lucide="wand-2" class="w-5 h-5"></i></button>
            </aside>

            <!-- 核心区 -->
            <div class="flex-1 flex overflow-hidden relative">
                <!-- 资料进项栏 -->
                <aside id="reference-sidebar" class="w-full md:w-[320px] flex-none border-r border-black/[0.05] bg-[#FBFBFA] flex flex-col transition-all">
                    <div class="p-5 border-b border-black/[0.03]">
                        <div class="flex justify-between items-center mb-5">
                            <span class="text-[10px] font-bold uppercase opacity-30 tracking-widest font-sans">Storage</span>
                            <div class="flex gap-2">
                                <button onclick="triggerUpload()" class="p-1 text-zinc-300 hover:text-black"><i data-lucide="file-up" class="w-4 h-4"></i></button>
                                <button onclick="addNewSource()" class="p-1 text-zinc-300 hover:text-black"><i data-lucide="plus" class="w-4 h-4"></i></button>
                            </div>
                            <input type="file" id="file-uploader" name="file-uploader" class="hidden" accept=".txt,.md">
                        </div>
                        <div class="flex gap-2 items-center bg-white border border-black/[0.05] p-2 rounded-xl shadow-inner focus-within:border-black/10 transition-all">
                            <input id="search-input" name="search-input" type="text" placeholder="检索新证据..." class="flex-1 bg-transparent border-none outline-none text-[10px] px-2 italic">
                            <button onclick="handleSearch()" class="p-1 text-zinc-300 hover:text-black"><i data-lucide="search" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div id="source-list" class="flex-1 overflow-y-auto p-4 space-y-1.5 no-scrollbar">
                        <!-- 资料列表 -->
                    </div>
                </aside>

                <!-- 工作区 -->
                <section id="workspace" class="flex-1 flex flex-col bg-white overflow-hidden relative shadow-inner">
                    <!-- 资料检视层 -->
                    <div id="source-viewer" class="h-[45%] border-b border-black/[0.08] bg-[#F9F8F6] p-10 overflow-y-auto relative hidden z-30 shadow-2xl">
                        <div class="flex justify-between items-center mb-6">
                            <span id="source-type-tag" class="text-[9px] tracking-widest uppercase font-bold opacity-30">Fragment</span>
                            <div class="flex gap-4">
                                <button onclick="deleteActiveSource()" class="text-zinc-300 hover:text-red-900 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                <button onclick="closeSourceViewer()" class="p-1 bg-black/5 hover:bg-black/10 rounded-full transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                        <input id="source-title" name="source-title" type="text" class="bg-transparent border-none outline-none text-sm font-bold mb-4 w-full uppercase tracking-widest text-zinc-400 focus:text-black">
                        <textarea id="source-content" name="source-content" class="w-full h-full bg-transparent border-none outline-none text-sm leading-relaxed text-zinc-600 resize-none font-light"></textarea>
                    </div>

                    <!-- 动态内容渲染区 -->
                    <div id="workspace-content" class="flex-1 p-8 md:p-16 lg:p-24 overflow-y-auto no-scrollbar">
                        <!-- 动态载入 Library 或 Workshop -->
                    </div>
                </section>

                <!-- 回响面板 -->
                <aside id="echo-sidebar" class="w-0 flex-none transition-all duration-700 bg-[#FBFBFA] border-l border-black/[0.05] overflow-hidden flex flex-col">
                    <div class="p-5 border-b border-black/[0.03] flex justify-between items-center bg-white shadow-sm">
                        <span class="text-[10px] font-bold uppercase opacity-30 italic font-sans tracking-widest">Intelligent Echo</span>
                        <button onclick="toggleAnalysis()" class="p-1.5 opacity-20 hover:opacity-100 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div id="chat-history" class="flex-1 overflow-y-auto p-12 space-y-12 no-scrollbar">
                        <!-- 聊天记录 -->
                    </div>
                    <div class="p-10 bg-white border-t border-black/[0.05]">
                        <div class="flex gap-4 items-center bg-[#F9F8F6] p-3 rounded-[30px] border border-black/[0.02] shadow-inner">
                            <input id="chat-input" name="chat-input" type="text" class="flex-1 bg-transparent border-none py-2 px-3 outline-none text-xs italic" placeholder="向资料库发问...">
                            <div class="flex gap-2">
                                <button onclick="toggleVoice()" id="mic-btn" class="p-3 rounded-full transition-all text-zinc-400 hover:text-black"><i data-lucide="mic" class="w-4 h-4"></i></button>
                                <button onclick="handleAskAI()" id="send-btn" class="w-11 h-11 bg-[#111] text-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all"><i data-lucide="send" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <!-- 全局悬浮球 -->
    <button id="fab" onclick="toggleAnalysis()" class="fixed bottom-10 right-10 w-16 h-16 bg-[#111] text-white shadow-2xl rounded-full flex items-center justify-center hover:scale-110 transition-all z-40 border-4 border-white hidden">
        <i data-lucide="message-circle" class="w-7 h-7"></i>
    </button>

    <!-- 设置面板 -->
    <div id="settings-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeSettings()"></div>
        <div class="relative w-full max-w-2xl bg-white p-12 shadow-2xl rounded-[60px] border border-black/[0.05] overflow-y-auto max-h-[90vh] no-scrollbar">
            <h3 class="text-sm font-bold uppercase opacity-30 text-center mb-14 italic font-sans">Lab Configuration</h3>
            <div class="space-y-10">
                <section class="space-y-4">
                    <label class="text-[10px] uppercase tracking-widest font-bold opacity-40">User Identity</label>
                    <input id="set-user" name="set-user" type="text" class="w-full bg-[#F9F8F6] p-5 text-sm border-none outline-none focus:bg-white transition-all rounded-[30px] shadow-inner font-bold">
                </section>
                <section class="space-y-6">
                    <label class="text-[10px] uppercase tracking-widest font-bold opacity-40">AI Engine</label>
                    <div class="grid grid-cols-2 gap-6">
                        <input id="set-host" name="set-host" type="text" class="bg-[#F9F8F6] p-5 text-xs rounded-[30px] outline-none" placeholder="API Host">
                        <input id="set-model" name="set-model" type="text" class="bg-[#F9F8F6] p-5 text-xs rounded-[30px] outline-none" placeholder="Model Name">
                    </div>
                    <input id="set-key" name="set-key" type="password" class="w-full bg-[#F9F8F6] p-5 text-xs rounded-[30px] outline-none" placeholder="Secret Key">
                </section>
                <div class="flex gap-4 pt-8">
                    <button onclick="backupData()" class="flex-1 py-5 border border-black/10 text-[10px] font-bold uppercase rounded-[30px]">Backup</button>
                    <button onclick="saveSettings()" class="flex-1 py-5 bg-black text-white text-[10px] font-bold uppercase rounded-[30px]">Save & Apply</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 随手记浮窗 -->
    <div id="scratchpad-modal" class="fixed bottom-24 right-10 w-80 h-[500px] bg-white shadow-2xl rounded-[40px] border border-black/[0.08] flex flex-col overflow-hidden z-[60] hidden">
        <div class="p-6 border-b bg-[#FBFBFA] flex justify-between items-center">
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-30">Global Scratch</span>
            <button onclick="toggleScratchpad()"><i data-lucide="x" class="w-4 h-4 opacity-30"></i></button>
        </div>
        <textarea id="scratch-area" name="scratch-area" class="flex-1 p-10 text-sm leading-relaxed border-none outline-none resize-none bg-transparent font-light italic" placeholder="捕捉闪念..."></textarea>
    </div>

    <script>
        // --- 初始化数据 ---
        let state = {
            projects: JSON.parse(localStorage.getItem('qumei_v37_projects')) || [
                { id: 'p1', name: "范式祛魅·实验卷宗", sources: [{id: 's1', title: '初始启示', content: '剥离伪装后的沉默才是真相。', type: 'manual'}], outline: "", manuscript: "", chatHistory: [], viewMode: 'library' }
            ],
            settings: JSON.parse(localStorage.getItem('qumei_v37_settings')) || {
                userName: 'Researcher', apiKey: '', apiEndpoint: 'https://generativelanguage.googleapis.com/v1beta/models', modelName: 'gemini-2.0-flash-exp'
            },
            scratchpad: localStorage.getItem('qumei_v37_scratch') || "",
            activeProjectId: null,
            activeSourceId: null
        };

        const PALETTES = [
            { bg: 'bg-[#E5E7E1]', text: 'text-[#4A5D4E]', border: 'border-[#CBD1C5]', icon: 'fingerprint' },
            { bg: 'bg-[#E3E8ED]', text: 'text-[#4E5B6E]', border: 'border-[#CDD5E0]', icon: 'database' },
            { bg: 'bg-[#EFE9E5]', text: 'text-[#6E644E]', border: 'border-[#E0DAC9]', icon: 'graduation-cap' },
            { bg: 'bg-[#EDEEF0]', text: 'text-[#5A5A5C]', border: 'border-[#D1D1D4]', icon: 'cpu' }
        ];

        // --- 核心渲染引擎 ---
        function render() {
            const grid = document.getElementById('project-grid');
            if (!state.activeProjectId) {
                document.getElementById('home-view').classList.remove('hidden');
                document.getElementById('project-view').classList.add('hidden');
                document.getElementById('back-home').classList.add('hidden');
                document.getElementById('fab').classList.add('hidden');
                grid.innerHTML = state.projects.map((p, i) => {
                    const pal = PALETTES[i % PALETTES.length];
                    return `
                        <div onclick="enterProject('${p.id}')" class="lab-card group cursor-pointer ${pal.bg} ${pal.border} border p-8 h-60 flex flex-col justify-between rounded-[40px] relative overflow-hidden">
                            <button onclick="event.stopPropagation(); deleteProject('${p.id}')" class="absolute top-6 right-6 opacity-0 group-hover:opacity-40 p-2 text-black transition-all z-10"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            <div class="w-11 h-11 rounded-2xl bg-white shadow-sm flex items-center justify-center ${pal.text}"><i data-lucide="${pal.icon}" class="w-5 h-5"></i></div>
                            <div>
                                <h3 class="text-xl font-bold mb-1 truncate tracking-tight ${pal.text}">${p.name || '未命名'}</h3>
                                <div class="h-1 w-full bg-white/30 rounded-full mt-2 overflow-hidden"><div class="h-full bg-black/10" style="width: ${Math.min(100, p.sources.length * 10)}%"></div></div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('project-view').classList.remove('hidden');
                document.getElementById('back-home').classList.remove('hidden');
                document.getElementById('fab').classList.remove('hidden');
                renderProjectWorkspace();
            }
            lucide.createIcons();
            save();
        }

        function renderProjectWorkspace() {
            const project = state.projects.find(p => p.id === state.activeProjectId);
            const sourceList = document.getElementById('source-list');
            const wsContent = document.getElementById('workspace-content');

            // 渲染左侧资料列表
            sourceList.innerHTML = project.sources.map(s => `
                <div onclick="openSource('${s.id}')" class="p-4 cursor-pointer transition-all rounded-xl border flex items-center gap-3 ${state.activeSourceId === s.id ? 'bg-white shadow-sm border-black/10' : 'border-transparent opacity-40 hover:opacity-100'}">
                    <i data-lucide="file-text" class="w-3 h-3"></i>
                    <span class="text-[11px] font-medium truncate">${s.title || 'Untitled'}</span>
                </div>
            `).join('');

            // 渲染主处理区
            if (project.viewMode === 'library') {
                wsContent.innerHTML = `
                    <div class="max-w-4xl mx-auto">
                        <div class="mb-14 flex justify-between items-baseline border-b border-black/[0.03] pb-6">
                            <div><h3 class="text-4xl font-bold tracking-tighter mb-2 italic">Knowledge Library</h3><p class="text-[10px] uppercase opacity-30 font-bold italic">碎片培育皿</p></div>
                            <button onclick="switchTab('workshop')" class="text-[11px] font-bold text-zinc-400 hover:text-black transition-all flex items-center gap-2">进入工坊 <i data-lucide="arrow-up-right" class="w-3 h-3"></i></button>
                        </div>
                        <div class="grid grid-cols-2 gap-8">
                            ${project.sources.map(s => `
                                <div onclick="openSource('${s.id}')" class="p-8 border border-black/[0.04] bg-[#FDFDFB] hover:shadow-2xl transition-all rounded-[40px] cursor-pointer group h-52 flex flex-col justify-between">
                                    <div class="px-3 py-1 bg-white border border-black/[0.05] rounded-full text-[8px] uppercase tracking-widest opacity-40 w-fit font-bold">${s.type || 'RAW'}</div>
                                    <div><h4 class="text-sm font-bold mb-2 truncate italic">${s.title}</h4><p class="text-[11px] leading-relaxed text-zinc-400 line-clamp-3 font-light">${s.content || '空...'}</p></div>
                                </div>
                            `).join('')}
                            <div onclick="triggerUpload()" class="p-8 border border-dashed border-black/[0.1] rounded-[40px] h-52 flex flex-col items-center justify-center text-zinc-300 hover:text-black transition-all"><i data-lucide="file-plus" class="w-6 h-6 mb-3"></i><span class="text-[9px] uppercase font-bold tracking-widest">Import</span></div>
                        </div>
                    </div>
                `;
            } else {
                wsContent.innerHTML = `
                    <div class="max-w-3xl mx-auto h-full flex flex-col">
                        <div class="mb-12 flex justify-between border-b border-black/[0.03] pb-4">
                            <div class="flex gap-8 text-[11px] font-bold uppercase tracking-widest">
                                <button onclick="setWritingView('manuscript')" class="${project.activeView !== 'outline' ? 'text-black border-b-2 border-black pb-2' : 'text-zinc-300'}">The Manuscript</button>
                                <button onclick="setWritingView('outline')" class="${project.activeView === 'outline' ? 'text-black border-b-2 border-black pb-2' : 'text-zinc-300'}">The Outline</button>
                            </div>
                            <button onclick="handleAskAI('analyze')" class="px-6 py-2 rounded-full border border-red-900/10 text-red-900 text-[10px] font-bold tracking-widest bg-red-50/20 hover:bg-red-50 transition-all flex items-center gap-2"><i data-lucide="sparkles" class="w-3 h-3"></i> 深度祛魅</button>
                        </div>
                        <input id="proj-title" type="text" class="bg-transparent border-none outline-none text-4xl font-bold mb-14 w-full tracking-tighter" placeholder="赋予题目..." value="${project.name}">
                        ${project.activeView === 'outline' 
                            ? `<textarea id="proj-outline" class="flex-1 bg-[#F9F9F7] p-10 rounded-[40px] outline-none text-lg leading-relaxed font-mono resize-none" placeholder="规划骨架...">${project.outline || ''}</textarea>`
                            : `<textarea id="proj-manuscript" class="flex-1 outline-none text-xl leading-[2.6] font-light resize-none" placeholder="开始撰写...">${project.manuscript || ''}</textarea>`
                        }
                    </div>
                `;
                // 绑定保存监听
                const t = document.getElementById('proj-title');
                if(t) t.oninput = (e) => updateProject(state.activeProjectId, {name: e.target.value});
                const o = document.getElementById('proj-outline');
                if(o) o.oninput = (e) => updateProject(state.activeProjectId, {outline: e.target.value});
                const m = document.getElementById('proj-manuscript');
                if(m) m.oninput = (e) => updateProject(state.activeProjectId, {manuscript: e.target.value});
            }
            lucide.createIcons();
        }

        // --- 动作处理 ---
        function createNewProject() {
            const id = 'p' + Date.now();
            state.projects.unshift({ id, name: "新记录单元", sources: [], manuscript: "", outline: "", chatHistory: [], viewMode: 'library' });
            enterProject(id);
        }

        function deleteProject(id) {
            if(confirm("确定永久销毁此单元？")) {
                state.projects = state.projects.filter(p => p.id !== id);
                state.activeProjectId = null;
                render();
            }
        }

        function enterProject(id) {
            state.activeProjectId = id;
            state.activeSourceId = null;
            const p = state.projects.find(x => x.id === id);
            p.viewMode = 'library';
            render();
        }

        function switchTab(tab) {
            const p = state.projects.find(x => x.id === state.activeProjectId);
            p.viewMode = tab;
            render();
        }

        function openSource(sid) {
            state.activeSourceId = sid;
            const project = state.projects.find(p => p.id === state.activeProjectId);
            const source = project.sources.find(s => s.id === sid);
            const viewer = document.getElementById('source-viewer');
            document.getElementById('source-title').value = source.title || "";
            document.getElementById('source-content').value = source.content || "";
            document.getElementById('source-type-tag').innerText = source.type || "Fragment";
            viewer.classList.remove('hidden');
            renderProjectWorkspace();
        }

        function deleteActiveSource() {
            if(confirm("移除此资料？")) {
                const project = state.projects.find(p => p.id === state.activeProjectId);
                project.sources = project.sources.filter(s => s.id !== state.activeSourceId);
                state.activeSourceId = null;
                document.getElementById('source-viewer').classList.add('hidden');
                render();
            }
        }

        function closeSourceViewer() {
            state.activeSourceId = null;
            document.getElementById('source-viewer').classList.add('hidden');
            render();
        }

        function triggerUpload() { document.getElementById('file-uploader').click(); }
        document.getElementById('file-uploader').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const project = state.projects.find(p => p.id === state.activeProjectId);
                project.sources.unshift({id: 'up'+Date.now(), title: file.name, content: ev.target.result, type: 'upload'});
                render();
            };
            reader.readAsText(file);
        };

        function setWritingView(v) {
            const p = state.projects.find(x => x.id === state.activeProjectId);
            p.activeView = v;
            render();
        }

        function toggleAnalysis() {
            const sidebar = document.getElementById('echo-sidebar');
            const isOpen = sidebar.style.width === '500px';
            sidebar.style.width = isOpen ? '0' : '500px';
            document.getElementById('fab').classList.toggle('hidden', !isOpen);
        }

        function openSettings() { document.getElementById('settings-modal').classList.remove('hidden'); }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        function saveSettings() {
            state.settings.userName = document.getElementById('set-user').value;
            state.settings.apiEndpoint = document.getElementById('set-host').value;
            state.settings.modelName = document.getElementById('set-model').value;
            state.settings.apiKey = document.getElementById('set-key').value;
            document.getElementById('display-username').innerText = state.settings.userName;
            closeSettings();
            save();
        }

        function toggleScratchpad() {
            const modal = document.getElementById('scratchpad-modal');
            modal.classList.toggle('hidden');
        }

        function save() {
            localStorage.setItem('qumei_v37_projects', JSON.stringify(state.projects));
            localStorage.setItem('qumei_v37_settings', JSON.stringify(state.settings));
            localStorage.setItem('qumei_v37_scratch', document.getElementById('scratch-area').value);
        }

        window.onload = () => {
            document.getElementById('set-user').value = state.settings.userName;
            document.getElementById('set-host').value = state.settings.apiEndpoint;
            document.getElementById('set-model').value = state.settings.modelName;
            document.getElementById('set-key').value = state.settings.apiKey;
            document.getElementById('display-username').innerText = state.settings.userName;
            document.getElementById('scratch-area').value = state.scratchpad;
            render();
        };

        document.getElementById('back-home').onclick = () => { state.activeProjectId = null; render(); };
    </script>
</body>
</html>
