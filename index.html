<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ONTO Lab | 知识祛魅共勉实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-lab: #F4F4F2;
            --font-serif: 'Noto Serif SC', serif;
            --font-sans: 'Inter', sans-serif;
        }
        body {
            background-color: var(--bg-lab);
            font-family: var(--font-serif);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .writing-v { writing-mode: vertical-rl; }
        input, textarea { font-family: var(--font-sans); }
        ::selection { background-color: #000; color: #fff; }
        
        .drawer-transition {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .lab-card {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @media (min-width: 1024px) {
            .lab-card:hover { transform: translateY(-8px); box-shadow: 0 30px 60px -12px rgba(0,0,0,0.1); }
        }

        html, body {
            height: 100% !important;
            overflow: hidden !important;
            position: fixed !important;
            width: 100% !important;
        }

        .content-area {
            will-change: transform;
            transform: translateZ(0);
        }

        .search-modal {
            transition: opacity 0.2s ease;
        }

        .ai-sidebar {
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (max-width: 1023px) {
            .ai-sidebar-mobile {
                width: 85vw !important;
                right: 0;
                left: auto;
            }
        }

        @media (min-width: 1024px) {
            .ai-sidebar-desktop {
                width: 400px !important;
            }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="h-14 px-4 md:px-6 border-b border-black/[0.05] bg-white/60 backdrop-blur-md flex justify-between items-center z-[60]">
        <div class="flex items-center gap-2 md:gap-4">
            <button id="back-home" class="p-2 hover:bg-black/5 rounded-full hidden" aria-label="返回首页">
                <i data-lucide="chevron-left" class="w-5 h-5"></i>
            </button>
            <div class="flex items-center gap-2">
                <span class="text-[10px] tracking-[0.3em] font-bold uppercase opacity-30 select-none">Onto / Lab</span>
                <div class="h-3 w-px bg-black/10 mx-1"></div>
                <span id="display-username" class="text-[10px] opacity-40 uppercase tracking-widest font-bold truncate max-w-[80px]">Scholar</span>
            </div>
        </div>
        <div class="flex items-center gap-1">
            <button onclick="toggleScratchpad()" class="p-2 text-zinc-400 hover:text-black"><i data-lucide="notebook" class="w-4 h-4"></i></button>
            <button onclick="openSettings()" class="p-2 text-zinc-400 hover:text-black"><i data-lucide="settings" class="w-4 h-4"></i></button>
        </div>
    </header>

    <main id="main-view" class="flex-1 relative overflow-hidden">
        
        <div id="home-view" class="h-full overflow-y-auto p-6 md:p-24 no-scrollbar">
            <div class="max-w-6xl mx-auto">
                <div class="flex justify-between items-end mb-12 md:mb-16">
                    <div>
                        <h2 class="text-3xl md:text-5xl font-light tracking-tighter mb-2 italic text-[#111]">Archives.</h2>
                        <p class="text-[10px] tracking-[0.4em] uppercase opacity-40 font-bold">选择一个知识空间</p>
                    </div>
                    <button onclick="createNewProject()" class="w-12 h-12 bg-black text-white rounded-full flex items-center justify-center hover:scale-105 transition-all shadow-xl" aria-label="新建项目">
                        <i data-lucide="plus" class="w-6 h-6"></i>
                    </button>
                </div>
                <div id="project-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
                </div>
            </div>
        </div>

        <div id="project-view" class="h-full hidden flex flex-col lg:flex-row overflow-hidden">
            
            <nav class="flex-none w-full lg:w-16 border-t lg:border-t-0 lg:border-r border-black/[0.05] bg-white flex lg:flex-col items-center justify-around lg:justify-start py-2 lg:py-6 gap-0 lg:gap-8 z-50 order-last lg:order-first">
                <button onclick="switchTab('library')" id="tab-library" class="p-4 lg:p-3 rounded-2xl transition-all bg-black text-white shadow-lg"><i data-lucide="library" class="w-5 h-5"></i></button>
                <button onclick="switchTab('workshop')" id="tab-workshop" class="p-4 lg:p-3 rounded-2xl transition-all text-zinc-300 hover:text-black"><i data-lucide="graduation-cap" class="w-5 h-5"></i></button>
                <button onclick="toggleMobileSidebar()" class="p-4 lg:hidden text-zinc-300"><i data-lucide="folder-search" class="w-5 h-5"></i></button>
                <div class="hidden lg:block flex-1"></div>
                <button onclick="toggleAnalysis()" id="btn-analysis" class="p-4 lg:p-3 rounded-2xl transition-all text-zinc-300 hover:text-red-900"><i data-lucide="wand-2" class="w-5 h-5"></i></button>
            </nav>

            <div class="flex-1 flex overflow-hidden relative">
                <aside id="reference-sidebar" class="absolute lg:relative top-0 left-0 h-full w-[280px] bg-[#FBFBFA] border-r border-black/[0.05] flex flex-col z-40 drawer-transition -translate-x-full lg:translate-x-0 shadow-2xl lg:shadow-none">
                    <div class="p-5 border-b border-black/[0.03]">
                        <div class="flex justify-between items-center mb-5">
                            <span class="text-[10px] font-bold uppercase opacity-30 tracking-widest font-sans">Storage</span>
                            <div class="flex gap-2">
                                <button onclick="triggerUpload()" class="p-1 text-zinc-300 hover:text-black"><i data-lucide="file-up" class="w-4 h-4"></i></button>
                                <button onclick="addNewSource()" class="p-1 text-zinc-300 hover:text-black"><i data-lucide="plus" class="w-4 h-4"></i></button>
                            </div>
                            <input type="file" id="file-uploader" class="hidden" accept=".txt,.md">
                        </div>
                        <div class="flex gap-2 items-center bg-white border border-black/[0.05] p-2 rounded-xl shadow-inner focus-within:border-black/10 transition-all">
                            <input id="search-input" type="text" placeholder="搜寻证据..." class="flex-1 bg-transparent border-none outline-none text-[10px] px-2 italic">
                            <button onclick="handleSearch()" class="p-1 text-zinc-300 hover:text-black"><i data-lucide="search" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div id="source-list" class="flex-1 overflow-y-auto p-4 space-y-1.5 no-scrollbar"></div>
                    <button onclick="toggleMobileSidebar()" class="lg:hidden p-4 border-t text-[10px] font-bold text-center opacity-40">CLOSE SIDELINE</button>
                </aside>

                <section id="workspace" class="flex-1 flex flex-col bg-white overflow-hidden relative shadow-inner">
                    <div id="source-viewer" class="absolute inset-0 bg-[#F9F8F6] p-6 md:p-10 overflow-y-auto hidden z-30 animate-in slide-in-from-bottom-4 duration-300">
                        <div class="flex justify-between items-center mb-6">
                            <span id="source-type-tag" class="text-[9px] tracking-widest uppercase font-bold opacity-30">Fragment</span>
                            <div class="flex gap-4">
                                <button onclick="deleteSource(currentSourceId)" class="p-2 active:bg-red-100 hover:bg-red-50 rounded-lg group transition-colors">
                                    <i data-lucide="trash-2" class="w-4 h-4 text-gray-400 group-hover:text-red-500 pointer-events-none"></i>
                                </button>
                                <button onclick="closeSourceViewer()" class="p-1 bg-black/5 hover:bg-black/10 rounded-full transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                        </div>
                        <input id="source-title" type="text" placeholder="标题" class="bg-transparent border-none outline-none text-base md:text-xl font-bold mb-4 w-full uppercase tracking-widest text-[#111]">
                        <textarea id="source-content" placeholder="输入内容..." class="w-full h-[60vh] bg-transparent border-none outline-none text-sm md:text-base leading-relaxed text-zinc-600 resize-none font-light"></textarea>
                    </div>

                    <div id="workspace-content" class="flex-1 p-6 md:p-16 lg:p-24 overflow-y-auto no-scrollbar content-area"></div>
                </section>

                <aside id="echo-sidebar" class="fixed lg:relative top-0 right-0 h-full w-0 flex-none transition-all duration-300 bg-[#FBFBFA] border-l border-black/[0.05] overflow-hidden flex flex-col z-[70] shadow-2xl lg:shadow-none ai-sidebar" style="width: 0;">
                    <div class="p-5 border-b border-black/[0.03] flex justify-between items-center bg-white shadow-sm">
                        <span class="text-[10px] font-bold uppercase opacity-30 italic font-sans tracking-widest">Intelligent Echo</span>
                        <button onclick="toggleAnalysis()" class="p-2 opacity-40 hover:opacity-100 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div id="chat-history" class="flex-1 overflow-y-auto p-6 md:p-8 space-y-4 no-scrollbar">
                        <div class="text-center text-[10px] opacity-30 italic">向资料库提问，AI将基于你的档案回答</div>
                    </div>
                    <div class="p-4 bg-white border-t border-black/[0.05]">
                        <div class="flex gap-3 items-center bg-[#F9F8F6] p-2 rounded-[30px] border border-black/[0.02] shadow-inner">
                            <input id="chat-input" type="text" class="flex-1 bg-transparent border-none py-2 px-3 outline-none text-xs italic" placeholder="向资料库发问...">
                            <button onclick="handleAskAI()" id="send-btn" class="w-8 h-8 bg-[#111] text-white rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition-all"><i data-lucide="send" class="w-3 h-3"></i></button>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>

    <div id="settings-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeSettings()"></div>
        <div class="relative w-full max-w-2xl bg-white p-8 md:p-12 shadow-2xl rounded-[40px] border border-black/[0.05] overflow-y-auto max-h-[90vh] no-scrollbar">
            <h3 class="text-sm font-bold uppercase opacity-30 text-center mb-10 italic font-sans">Lab Configuration</h3>
            <div class="space-y-8">
                <section class="space-y-3">
                    <label for="set-user" class="text-[10px] uppercase tracking-widest font-bold opacity-40">User Name / 署名</label>
                    <input id="set-user" type="text" class="w-full bg-[#F9F8F6] p-4 text-sm rounded-[24px] outline-none font-bold" placeholder="你的名字">
                </section>
                <section class="space-y-6">
                    <label class="text-[10px] uppercase tracking-widest font-bold opacity-40">AI Engine / 智库接口</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input id="set-host" type="text" class="bg-[#F9F8F6] p-4 text-xs rounded-[24px] outline-none" placeholder="Endpoint URL">
                        <input id="set-model" type="text" class="bg-[#F9F8F6] p-4 text-xs rounded-[24px] outline-none" placeholder="Model Name">
                    </div>
                    <input id="set-key" type="password" class="w-full bg-[#F9F8F6] p-4 text-xs rounded-[24px] outline-none" placeholder="Secret Key">
                </section>
                <div class="flex gap-4 pt-6">
                    <button onclick="backupData()" class="flex-1 py-4 border border-black/10 text-[10px] font-bold uppercase rounded-[24px]">Backup</button>
                    <button onclick="saveSettings()" class="flex-1 py-4 bg-black text-white text-[10px] font-bold uppercase rounded-[24px]">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="scratchpad-modal" class="fixed bottom-24 right-4 md:right-10 w-[calc(100%-2rem)] md:w-80 h-[450px] bg-white shadow-2xl rounded-[32px] border border-black/[0.08] flex flex-col overflow-hidden z-[60] hidden animate-in slide-in-from-bottom-4">
        <div class="p-5 border-b bg-[#FBFBFA] flex justify-between items-center">
            <span class="text-[10px] font-bold uppercase tracking-widest opacity-30">Scratchpad</span>
            <button onclick="toggleScratchpad()"><i data-lucide="x" class="w-4 h-4 opacity-30"></i></button>
        </div>
        <textarea id="scratch-area" class="flex-1 p-8 text-sm leading-relaxed border-none outline-none resize-none bg-transparent font-light italic" placeholder="记录闪念..."></textarea>
        <div class="p-4 border-t flex gap-3">
            <button onclick="archiveScratch()" class="flex-1 py-2 bg-black text-white text-[10px] uppercase font-bold rounded-xl tracking-widest shadow-lg">存入当前库档案</button>
            <button onclick="document.getElementById('scratch-area').value=''" class="flex-1 py-2 border border-black/10 text-[10px] uppercase font-bold rounded-xl opacity-40">清空</button>
        </div>
    </div>

    <div id="recycle-modal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeRecycleBin()"></div>
        <div class="relative w-full max-w-2xl bg-white p-8 md:p-12 shadow-2xl rounded-[40px] border border-black/[0.05] overflow-y-auto max-h-[90vh] no-scrollbar">
            <h3 class="text-sm font-bold uppercase opacity-30 text-center mb-6 italic font-sans">回收站</h3>
            <div id="recycle-list" class="space-y-3 mb-6"></div>
            <div class="flex gap-3">
                <button onclick="clearRecycleBin()" class="flex-1 py-4 border border-red-500/30 text-red-600 text-[10px] font-bold uppercase rounded-[24px] hover:bg-red-50 transition-all">清空回收站</button>
                <button onclick="closeRecycleBin()" class="flex-1 py-4 border border-black/10 text-[10px] font-bold uppercase rounded-[24px]">关闭</button>
            </div>
        </div>
    </div>

    <div id="mobile-search-modal" class="fixed inset-0 z-[200] bg-white hidden flex-col">
        <div class="p-4 border-b flex gap-3 items-center">
            <button onclick="closeMobileSearch()" class="p-2"><i data-lucide="arrow-left" class="w-5 h-5"></i></button>
            <input id="mobile-search-input" type="text" placeholder="搜寻证据..." class="flex-1 bg-[#F9F8F6] p-3 rounded-xl outline-none text-sm" autofocus>
            <button onclick="doMobileSearch()" class="px-4 py-2 bg-black text-white text-xs rounded-xl">搜索</button>
        </div>
        <div id="mobile-search-results" class="flex-1 overflow-y-auto p-4"></div>
    </div>

    <script>
        let state = {
            projects: JSON.parse(localStorage.getItem('qumei_v38_projects')) || [
                { id: 'p1', name: "深井研究·第一卷", sources: [{id: 's1', title: '启示录', content: '剥离伪装后的沉默。', type: 'manual', deleted: false}], outline: "", manuscript: "", chatHistory: [], viewMode: 'library', activeView: 'manuscript' }
            ],
            settings: JSON.parse(localStorage.getItem('qumei_v38_settings')) || {
                userName: 'Researcher', apiKey: '', apiEndpoint: 'https://generativelanguage.googleapis.com/v1beta/models', modelName: 'gemini-2.0-flash-exp'
            },
            scratchpad: localStorage.getItem('qumei_v38_scratch') || "",
            activeProjectId: null,
            activeSourceId: null
        };

        let currentSourceId = null;

        const PALETTES = [
            { bg: 'bg-[#E5E7E1]', text: 'text-[#4A5D4E]', border: 'border-[#CBD1C5]', icon: 'fingerprint' },
            { bg: 'bg-[#E3E8ED]', text: 'text-[#4E5B6E]', border: 'border-[#CDD5E0]', icon: 'database' },
            { bg: 'bg-[#EFE9E5]', text: 'text-[#6E644E]', border: 'border-[#E0DAC9]', icon: 'graduation-cap' }
        ];

        function render() {
            const grid = document.getElementById('project-grid');
            if (!state.activeProjectId) {
                document.getElementById('home-view').classList.remove('hidden');
                document.getElementById('project-view').classList.add('hidden');
                document.getElementById('back-home').classList.add('hidden');
                grid.innerHTML = state.projects.map((p, i) => {
                    const pal = PALETTES[i % PALETTES.length];
                    const activeCount = p.sources.filter(s => !s.deleted).length;
                    return `
                        <div onclick="enterProject('${p.id}')" class="lab-card group cursor-pointer ${pal.bg} ${pal.border} border p-6 md:p-8 h-56 md:h-60 flex flex-col justify-between rounded-[32px] relative overflow-hidden">
                            <button onclick="event.stopPropagation(); deleteProject('${p.id}')" class="absolute top-4 right-4 p-2 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-50 rounded-lg">
                                <i data-lucide="trash-2" class="w-4 h-4 text-gray-400 hover:text-red-500"></i>
                            </button>
                            <div class="w-10 h-10 rounded-2xl bg-white shadow-sm flex items-center justify-center ${pal.text}"><i data-lucide="${pal.icon}" class="w-5 h-5"></i></div>
                            <div>
                                <h3 class="text-lg md:text-xl font-bold mb-1 truncate tracking-tight ${pal.text}">${escapeHtml(p.name || '未命名')}</h3>
                                <div class="h-1 w-full bg-white/30 rounded-full mt-2 overflow-hidden"><div class="h-full bg-black/20" style="width: ${Math.min(100, activeCount * 15)}%"></div></div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                document.getElementById('home-view').classList.add('hidden');
                document.getElementById('project-view').classList.remove('hidden');
                document.getElementById('back-home').classList.remove('hidden');
                renderProjectWorkspace();
            }
            if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
            save();
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function renderProjectWorkspace() {
            const project = state.projects.find(p => p.id === state.activeProjectId);
            if (!project) return;
            const sourceList = document.getElementById('source-list');
            const wsContent = document.getElementById('workspace-content');

            const activeSources = project.sources.filter(s => !s.deleted);
            sourceList.innerHTML = activeSources.map(s => `
                <div onclick="openSource('${s.id}')" class="p-3 cursor-pointer transition-all rounded-xl border flex items-center gap-3 ${state.activeSourceId === s.id ? 'bg-white shadow-sm border-black/10' : 'border-transparent opacity-40 hover:opacity-100'}">
                    <i data-lucide="file-text" class="w-3 h-3"></i>
                    <span class="text-[11px] font-medium truncate">${escapeHtml(s.title || 'Untitled')}</span>
                </div>
            `).join('');

            if (project.viewMode === 'library') {
                const activeSourcesForGrid = project.sources.filter(s => !s.deleted);
                wsContent.innerHTML = `
                    <div class="max-w-4xl mx-auto">
                        <div class="mb-8 md:mb-14 flex justify-between items-baseline border-b border-black/[0.03] pb-6 flex-wrap gap-3">
                            <div><h3 class="text-2xl md:text-4xl font-bold tracking-tighter mb-1 italic">Library</h3><p class="text-[9px] uppercase opacity-30 font-bold">知识碎片仓储</p></div>
                            <div class="flex gap-3">
                                <button onclick="openRecycleBin()" class="text-[10px] font-bold text-zinc-400 hover:text-red-600 transition-all flex items-center gap-2">回收站 <i data-lucide="trash-2" class="w-3 h-3"></i></button>
                                <button onclick="switchTab('workshop')" class="text-[10px] font-bold text-zinc-400 hover:text-black transition-all flex items-center gap-2">进入工坊 <i data-lucide="arrow-up-right" class="w-3 h-3"></i></button>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-8">
                            ${activeSourcesForGrid.map(s => `
                                <div onclick="openSource('${s.id}')" class="p-6 md:p-8 border border-black/[0.04] bg-[#FDFDFB] hover:shadow-xl transition-all rounded-[32px] cursor-pointer group h-44 md:h-52 flex flex-col justify-between relative">
                                    <div class="absolute top-4 right-4">
                                        <button onclick="event.stopPropagation(); deleteSource('${s.id}')" class="p-1 opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-50 rounded-lg">
                                            <i data-lucide="trash-2" class="w-4 h-4 text-gray-400 hover:text-red-500"></i>
                                        </button>
                                    </div>
                                    <div class="px-2 py-1 bg-white border border-black/[0.05] rounded-full text-[8px] uppercase tracking-widest opacity-40 w-fit font-bold">${s.type || 'RAW'}</div>
                                    <div><h4 class="text-sm font-bold mb-1 truncate italic">${escapeHtml(s.title)}</h4><p class="text-[10px] leading-relaxed text-zinc-400 line-clamp-2 font-light">${escapeHtml(s.content || '...').substring(0, 100)}</p></div>
                                </div>
                            `).join('')}
                            <div onclick="triggerUpload()" class="p-8 border border-dashed border-black/[0.1] rounded-[32px] h-44 md:h-52 flex flex-col items-center justify-center text-zinc-300 hover:text-black transition-all cursor-pointer"><i data-lucide="file-plus" class="w-5 h-5 mb-2"></i><span class="text-[9px] uppercase font-bold tracking-widest">Import</span></div>
                        </div>
                    </div>
                `;
            } else {
                wsContent.innerHTML = `
                    <div class="max-w-3xl mx-auto h-full flex flex-col">
                        <div class="mb-8 md:mb-12 flex justify-between border-b border-black/[0.03] pb-4 flex-wrap gap-3">
                            <div class="flex gap-4 md:gap-8 text-[10px] md:text-[11px] font-bold uppercase tracking-widest">
                                <button onclick="setWritingView('manuscript')" class="${project.activeView !== 'outline' ? 'text-black border-b-2 border-black pb-1' : 'text-zinc-300'}">Draft</button>
                                <button onclick="setWritingView('outline')" class="${project.activeView === 'outline' ? 'text-black border-b-2 border-black pb-1' : 'text-zinc-300'}">Outline</button>
                            </div>
                            <button onclick="handleAskAI('analyze')" class="px-4 md:px-6 py-2 rounded-full border border-red-900/10 text-red-900 text-[9px] font-bold tracking-widest bg-red-50/20 flex items-center gap-2 transition-all"><i data-lucide="sparkles" class="w-3 h-3"></i> 学术祛魅</button>
                        </div>
                        <input id="proj-title-in" type="text" class="bg-transparent border-none outline-none text-2xl md:text-4xl font-bold mb-8 md:mb-14 w-full tracking-tighter" placeholder="题目" value="${escapeHtml(project.name)}">
                        ${project.activeView === 'outline' 
                            ? `<textarea id="p-outline" class="flex-1 bg-[#F9F9F7] p-6 md:p-10 rounded-[32px] outline-none text-base md:text-lg leading-relaxed font-mono resize-none border-none" placeholder="逻辑骨架...">${escapeHtml(project.outline || '')}</textarea>`
                            : `<textarea id="p-draft" class="flex-1 outline-none text-lg md:text-xl leading-[2.4] font-light resize-none border-none" placeholder="开始创作...">${escapeHtml(project.manuscript || '')}</textarea>`
                        }
                    </div>
                `;
                ['proj-title-in', 'p-outline', 'p-draft'].forEach(id => {
                    const el = document.getElementById(id);
                    if(el) el.oninput = (e) => {
                        const updates = id === 'proj-title-in' ? {name: e.target.value} : id === 'p-outline' ? {outline: e.target.value} : {manuscript: e.target.value};
                        updateProject(state.activeProjectId, updates);
                    };
                });
            }
            if (typeof lucide !== 'undefined' && lucide.createIcons) lucide.createIcons();
        }

        // 返回首页功能
        function goBackHome() {
            state.activeProjectId = null;
            state.activeSourceId = null;
            currentSourceId = null;
            render();
        }

        function enterProject(id) { state.activeProjectId = id; render(); }
        
        function createNewProject() {
            const id = 'p' + Date.now();
            state.projects.unshift({ id, name: "新记录单元", sources: [], manuscript: "", outline: "", chatHistory: [], viewMode: 'library', activeView: 'manuscript' });
            enterProject(id);
        }
        
        function switchTab(tab) { 
            const p = state.projects.find(x => x.id === state.activeProjectId);
            if (p) p.viewMode = tab; 
            render(); 
        }
        
        function openSource(sid) {
            state.activeSourceId = sid;
            currentSourceId = sid;
            const p = state.projects.find(x => x.id === state.activeProjectId);
            const s = p.sources.find(x => x.id === sid);
            if (!s) return;
            document.getElementById('source-title').value = s.title;
            document.getElementById('source-content').value = s.content;
            document.getElementById('source-viewer').classList.remove('hidden');
        }
        
        function closeSourceViewer() { 
            document.getElementById('source-viewer').classList.add('hidden'); 
            state.activeSourceId = null; 
            currentSourceId = null;
            render(); 
        }

        document.getElementById('source-title').oninput = (e) => {
            const p = state.projects.find(x => x.id === state.activeProjectId);
            const s = p.sources.find(x => x.id === state.activeSourceId);
            if (s) s.title = e.target.value;
            save();
        };
        
        document.getElementById('source-content').oninput = (e) => {
            const p = state.projects.find(x => x.id === state.activeProjectId);
            const s = p.sources.find(x => x.id === state.activeSourceId);
            if (s) s.content = e.target.value;
            save();
        };

        function toggleMobileSidebar() {
            const sidebar = document.getElementById('reference-sidebar');
            sidebar.classList.toggle('-translate-x-full');
            sidebar.classList.toggle('translate-x-0');
        }

        function toggleAnalysis() {
            const sidebar = document.getElementById('echo-sidebar');
            const isDesktop = window.innerWidth >= 1024;
            const currentWidth = sidebar.style.width;
            
            if (currentWidth === '400px' || currentWidth === '85vw' || (currentWidth && parseInt(currentWidth) > 0)) {
                sidebar.style.width = '0';
            } else {
                if (isDesktop) {
                    sidebar.style.width = '400px';
                } else {
                    sidebar.style.width = '85vw';
                }
            }
        }

        function toggleScratchpad() { 
            const modal = document.getElementById('scratchpad-modal');
            modal.classList.toggle('hidden');
        }
        
        function openSettings() { 
            document.getElementById('settings-modal').classList.remove('hidden'); 
        }
        
        function closeSettings() { 
            document.getElementById('settings-modal').classList.add('hidden'); 
        }
        
        function saveSettings() {
            state.settings.userName = document.getElementById('set-user').value;
            state.settings.apiEndpoint = document.getElementById('set-host').value;
            state.settings.modelName = document.getElementById('set-model').value;
            state.settings.apiKey = document.getElementById('set-key').value;
            document.getElementById('display-username').innerText = state.settings.userName;
            closeSettings();
            save();
        }

        function updateProject(id, updates) {
            const p = state.projects.find(x => x.id === id);
            if (p) Object.assign(p, updates);
            save();
        }

        function save() {
            localStorage.setItem('qumei_v38_projects', JSON.stringify(state.projects));
            localStorage.setItem('qumei_v38_settings', JSON.stringify(state.settings));
            localStorage.setItem('qumei_v38_scratch', document.getElementById('scratch-area').value);
        }

        function triggerUpload() { 
            document.getElementById('file-uploader').click(); 
        }

        function deleteProject(id) {
            if(confirm("确定销毁这个记录单元吗？")) {
                state.projects = state.projects.filter(p => p.id !== id);
                if (state.activeProjectId === id) state.activeProjectId = null;
                save();
                render();
            }
        }

        function deleteSource(sid) {
            if (!state.activeProjectId) return;
            const p = state.projects.find(x => x.id === state.activeProjectId);
            const s = p.sources.find(x => x.id === sid);
            
            if (s && !s.deleted) {
                if (confirm('将这件档案移至回收站？')) {
                    s.deleted = true;
                    s.deletedAt = Date.now();
                    
                    if (state.activeSourceId === sid) {
                        closeSourceViewer();
                    }
                    
                    save();
                    render();
                }
            }
        }

        function restoreSource(sourceId, projectId) {
            const project = state.projects.find(p => p.id === projectId);
            if (!project) return;
            
            const source = project.sources.find(s => s.id === sourceId);
            if (source && source.deleted === true) {
                if (confirm(`恢复档案「${source.title || '未命名'}」到项目「${project.name}」？`)) {
                    source.deleted = false;
                    delete source.deletedAt;
                    save();
                    render();
                    closeRecycleBin();
                }
            }
        }

        function clearRecycleBin() {
            if (confirm('⚠️ 警告：清空回收站将永久删除所有档案，无法恢复！确定要继续吗？')) {
                state.projects.forEach(project => {
                    project.sources = project.sources.filter(s => !s.deleted);
                });
                save();
                render();
                closeRecycleBin();
                alert('回收站已清空');
            }
        }

        function openRecycleBin() {
            const deletedItems = [];
            state.projects.forEach(project => {
                project.sources.forEach(source => {
                    if (source.deleted) {
                        deletedItems.push({
                            sourceId: source.id,
                            projectId: project.id,
                            projectName: project.name,
                            title: source.title,
                            deletedAt: source.deletedAt
                        });
                    }
                });
            });
            
            if (deletedItems.length === 0) {
                alert('回收站为空');
                return;
            }
            
            const modal = document.getElementById('recycle-modal');
            const listContainer = document.getElementById('recycle-list');
            listContainer.innerHTML = deletedItems.map(item => `
                <div class="p-4 border border-black/10 rounded-2xl flex justify-between items-center">
                    <div class="flex-1">
                        <div class="font-bold text-sm">${escapeHtml(item.title || '未命名档案')}</div>
                        <div class="text-[9px] opacity-40 mt-1">来自项目：${escapeHtml(item.projectName)}</div>
                        <div class="text-[8px] opacity-30 mt-1">删除时间：${new Date(item.deletedAt).toLocaleString()}</div>
                    </div>
                    <button onclick="restoreSource('${item.sourceId}', '${item.projectId}')" class="px-4 py-2 bg-black text-white text-[9px] font-bold uppercase rounded-full hover:scale-105 transition-all">
                        恢复
                    </button>
                </div>
            `).join('');
            
            modal.classList.remove('hidden');
        }

        function closeRecycleBin() {
            const modal = document.getElementById('recycle-modal');
            if (modal) modal.classList.add('hidden');
        }

        function setWritingView(view) {
            const p = state.projects.find(x => x.id === state.activeProjectId);
            if (p) p.activeView = view;
            render();
        }

        function addNewSource() {
            if (!state.activeProjectId) return;
            const p = state.projects.find(x => x.id === state.activeProjectId);
            const newSource = {
                id: 's' + Date.now(),
                title: "新档案",
                content: "",
                type: 'manual',
                deleted: false
            };
            p.sources.unshift(newSource);
            save();
            render();
            openSource(newSource.id);
        }

        function handleSearch() {
            if (window.innerWidth < 768) {
                openMobileSearch();
                return;
            }
            
            const keyword = document.getElementById('search-input').value.toLowerCase();
            if (!keyword) return;
            const p = state.projects.find(x => x.id === state.activeProjectId);
            if (!p) return;
            const results = p.sources.filter(s => !s.deleted && (s.title.toLowerCase().includes(keyword) || s.content.toLowerCase().includes(keyword)));
            if (results.length === 0) {
                alert('未找到匹配的档案');
            } else {
                alert(`找到 ${results.length} 个档案`);
            }
        }

        function openMobileSearch() {
            const modal = document.getElementById('mobile-search-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                document.getElementById('mobile-search-input').focus();
            }, 100);
        }

        function closeMobileSearch() {
            const modal = document.getElementById('mobile-search-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        function doMobileSearch() {
            const keyword = document.getElementById('mobile-search-input').value.toLowerCase();
            if (!keyword) return;
            const p = state.projects.find(x => x.id === state.activeProjectId);
            if (!p) return;
            const results = p.sources.filter(s => !s.deleted && (s.title.toLowerCase().includes(keyword) || s.content.toLowerCase().includes(keyword)));
            const resultsContainer = document.getElementById('mobile-search-results');
            
            if (results.length === 0) {
                resultsContainer.innerHTML = '<div class="text-center text-zinc-400 text-sm py-8">未找到匹配的档案</div>';
            } else {
                resultsContainer.innerHTML = results.map(s => `
                    <div onclick="openSource('${s.id}'); closeMobileSearch();" class="p-4 border-b border-black/5 cursor-pointer hover:bg-black/5">
                        <div class="font-bold text-sm">${escapeHtml(s.title)}</div>
                        <div class="text-[10px] opacity-40 mt-1">${escapeHtml(s.content || '...').substring(0, 80)}</div>
                    </div>
                `).join('');
            }
        }

        function handleAskAI() {
            const input = document.getElementById('chat-input');
            const question = input.value;
            if (!question.trim()) return;
            const chatHistory = document.getElementById('chat-history');
            chatHistory.innerHTML += `<div class="text-right"><div class="inline-block bg-black text-white p-3 rounded-2xl text-xs max-w-[85%] break-words">${escapeHtml(question)}</div></div>`;
            input.value = '';
            chatHistory.scrollTop = chatHistory.scrollHeight;
            
            setTimeout(() => {
                chatHistory.innerHTML += `<div class="text-left"><div class="inline-block bg-[#F1F0EC] p-3 rounded-2xl text-xs max-w-[85%] break-words italic">正在思考中...</div></div>`;
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }, 100);
        }

        function archiveScratch() {
            const content = document.getElementById('scratch-area').value;
            if (!content.trim()) return;
            if (!state.activeProjectId) return alert("归档前请先进入一个项目");

            const p = state.projects.find(x => x.id === state.activeProjectId);
            p.sources.unshift({
                id: 's' + Date.now(),
                title: "随手记-" + new Date().toLocaleTimeString(),
                content: content,
                type: 'SCRATCH',
                deleted: false
            });
            save();
            render();
            alert("随手记内容已归档至资料库");
        }

        function backupData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "qumei_backup_" + new Date().toLocaleDateString() + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        window.onload = () => {
            document.getElementById('set-user').value = state.settings.userName;
            document.getElementById('set-host').value = state.settings.apiEndpoint;
            document.getElementById('set-model').value = state.settings.modelName;
            document.getElementById('set-key').value = state.settings.apiKey;
            document.getElementById('display-username').innerText = state.settings.userName;
            document.getElementById('scratch-area').value = state.scratchpad;
            
            // 绑定返回首页按钮
            document.getElementById('back-home').onclick = goBackHome;
            
            state.projects.forEach(project => {
                project.sources.forEach(source => {
                    if (source.deleted === undefined) source.deleted = false;
                });
                if (project.activeView === undefined) project.activeView = 'manuscript';
            });
            
            render();
        };

        document.getElementById('file-uploader').onchange = function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!state.activeProjectId) {
                alert("请先进入一个项目单元，再上传该单元的文档");
                return;
            }

            const reader = new FileReader();
            
            reader.onload = function(event) {
                const buffer = event.target.result;
                const uint8 = new Uint8Array(buffer);
                
                const decoder = new TextDecoder('utf-8', { fatal: true });
                let content = "";
                try {
                    content = decoder.decode(uint8);
                } catch (err) {
                    const gbkDecoder = new TextDecoder('gbk');
                    content = gbkDecoder.decode(uint8);
                }

                const p = state.projects.find(x => x.id === state.activeProjectId);
                const newSource = {
                    id: 's' + Date.now(),
                    title: file.name.replace(/\.[^/.]+$/, ""),
                    content: content,
                    type: 'DOCUMENT',
                    deleted: false
                };
                
                p.sources.unshift(newSource);
                save();
                render();
                alert(`文档《${file.name}》已识别编码并成功存入`);
            };
            
            reader.readAsArrayBuffer(file);
        };

        document.getElementById('mobile-search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doMobileSearch();
        });
    </script>
</body>
</html>
